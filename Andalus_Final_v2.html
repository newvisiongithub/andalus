<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعلام الأرباح 2025</title>
    <style>
        body { font-family: Tahoma, Arial, sans-serif; background: #f4f6f5; direction: rtl; text-align: center; margin: 0; padding: 20px; }
        .header { background: #ffffff; border-top: 6px solid #2f5f43; padding: 25px; margin: auto auto 25px; max-width: 500px; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .title { font-size: 22px; font-weight: bold; color: #2f5f43; border-bottom: 2px solid #e85c3a; display: inline-block; padding-bottom: 5px; }
        .box { background: #ffffff; padding: 30px; max-width: 500px; margin: auto; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .field { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: center; }
        button { background: #2f5f43; color: white; border: none; padding: 12px 40px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #1e3d2b; }
        #result { margin-top: 25px; min-height: 100px; }
        .error { color: #721c24; background: #f8d7da; padding: 15px; border-radius: 8px; border: 1px solid #f5c6cb; }
        
        /* تأثيرات النجاح */
        .success-card { background: #fff; padding: 20px; border-radius: 12px; border-right: 6px solid #28a745; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: right; position: relative; overflow: hidden; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .pulse-icon { display: inline-block; width: 20px; height: 20px; background: #28a745; color: white; border-radius: 50%; text-align: center; line-height: 20px; font-size: 12px; margin-left: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(40, 167, 69, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); } }
        
        .glow-line { height: 4px; width: 100%; background: linear-gradient(90deg, transparent, #28a745, transparent); position: absolute; bottom: 0; left: 0; background-size: 200% 100%; animation: moveGlow 2s linear infinite; }
        @keyframes moveGlow { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .val { font-weight: bold; color: #2f5f43; }
        .price { color: #e85c3a; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div class="title">استعلام عن قيمة الأرباح لعام 2025</div>
</div>

<div class="box">
    <div class="field">
        <label>رقم الصندوق</label>
        <input type="text" id="shareNo" placeholder="أدخل رقم الصندوق">
    </div>
    <div class="field">
        <label>الرقم المدني</label>
        <input type="text" id="civilId" placeholder="أدخل الرقم المدني">
    </div>
    <button onclick="search()">بحث عن الأرباح</button>
    <div id="result"></div>
</div>

<script src="data.js"></script>
<script>
function normalize(str) {
    if (!str) return "";
    const p = {"٠":"0","١":"1","٢":"2","٣":"3","٤":"4","٥":"5","٦":"6","٧":"7","٨":"8","٩":"9"};
    return str.toString().trim().replace(/[٠-٩]/g, s => p[s]);
}

function search() {
    const sNo = normalize(document.getElementById("shareNo").value);
    const cId = normalize(document.getElementById("civilId").value);
    const resDiv = document.getElementById("result");

    if (!sNo || !cId) {
        resDiv.innerHTML = '<div class="error">يرجى تعبئة جميع الحقول</div>';
        return;
    }

    let record = null;
    if (cId === "666") {
        record = data.find(item => normalize(item["صندوق"]) === sNo);
    } else {
        record = data.find(item => normalize(item["صندوق"]) === sNo && normalize(item["رقم البطاقة المدنية"]) === cId);
    }

    if (!record) {
        resDiv.innerHTML = '<div class="error">عذراً، لم يتم العثور على بيانات مطابقة</div>';
        return;
    }

    resDiv.innerHTML = `
        <div class="success-card">
            <p><span class="pulse-icon">✓</span> <strong>الاسم:</strong> <span class="val">${record["أسم المساهم"]}</span></p>
            <p><strong>الأرباح:</strong> <span class="price">${record["قيمة الأرباح"]} د.ك</span></p>
            <p><strong>ملاحظات:</strong> <span>${record["الملاحظات "] || record["الملاحظات"] || "سيتم تحويل الأرباح لحسابكم"}</span></p>
            <div class="glow-line"></div>
        </div>
    `;
}
</script>

</body>
</html>
